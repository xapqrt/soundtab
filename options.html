<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SoundTab Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main class="panel">
    <h1>SoundTab Domain Settings</h1>
    <p class="sub">Per-domain track overrides and mute controls.</p>
   
    <div class="row">
      <input id="domainInput" placeholder="example.com" />
      <select id="trackSelect"></select>
      <label class="toggle-container"><input id="muteToggle" type="checkbox" /> mute</label>
      <button id="saveBtn">save</button>
    </div>

    <div class="row">
         <button id="reloadBtn">reload list</button>
    </div>

             <table>
                  <thead>
                    <tr><th>domain</th><th>track</th><th>muted</th><th>remove</th></tr>
                  </thead>
                  <tbody id="domainTable"></tbody>
                </table>

      <p id="status" class="status">idle</p>
      </main>
      <script src="options.js"></script>
    </body>
    </html>
