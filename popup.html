<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>SoundTab</title>
        <link rel ="stylesheet" href="popup.css" />
    </head>
    <body>
        <div class="wrap">
            <div id = "domain" class="domain">loading domain...</div>
            <select id="track"></select>
            <label class="volLabel" for="vol">Master Volume</label>
            <input id="vol" type="range" min="0" max="100" value="22" />
            <div id="status" class="status">listening...</div>
          <button id="openSettings" class="settingsBtn">Open Full Settings</button>
           <label class="mute"><input id="globalMute" type="checkbox" /> Global Mute</label>
          <label class="mute"><input id="mute" type="checkbox" /> Mute This Domain</label>
        </div>
        <script src="popup.js"></script>
    </body>
</html>
