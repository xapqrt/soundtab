<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>SoundTab</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
        <link rel ="stylesheet" href="popup.css" />
    </head>
    <body>
        <div class="wrap">
            <div id="domain" class="domain">loading domain...</div>
            <select id="track"></select>
            <div class="vol-container">
                <label class="volLabel" for="vol">Master Volume</label>
                <input id="vol" type="range" min="0" max="100" value="22" />
            </div>
            <div class="status-container">
                <span class="status-dot"></span>
                <div id="status" class="status">listening...</div>
            </div>
            <button id="openSettings" class="settingsBtn">Open Full Settings</button>
            <div class="toggles">
                <label class="mute"><input id="globalMute" type="checkbox" /> Global Mute</label>
                <label class="mute"><input id="mute" type="checkbox" /> Mute This Domain</label>
            </div>
        </div>
        <script src="popup.js"></script>
    </body>
</html>
